services:
  mongodb:
    image: mongo:7
    container_name: rag-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  chroma:
    image: chromadb/chroma:latest
    container_name: rag-chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/data
    environment:
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_HTTP_PORT=8000
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: rag-backend
    depends_on:
      - mongodb
      - chroma
    env_file:
      - backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/storage:/app/storage
      - backend_data:/data

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: rag-worker
    depends_on:
      - mongodb
      - chroma
    env_file:
      - backend/.env
    command: ["python", "-m", "app.workers.ingestion_worker"]
    volumes:
      - ./backend/storage:/app/storage
      - backend_data:/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rag-frontend
    depends_on:
      - backend
    env_file:
      - frontend/.env.local
    ports:
      - "3000:3000"

volumes:
  mongodb_data:
  chroma_data:
  backend_data:
